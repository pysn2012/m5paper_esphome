# 全局变量
substitutions:
  device_name: m5paper
  friendly_name: M5paper esphome

  # 允许显示的字符集
  allowed_characters: |-
    一二三四五六七八九十百千万亿温湿度时间分秒你好世界我他和开心快乐电量欢迎环境信息·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?
 
# ESPHome 核心配置
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0               # 要求的最低 ESPHome 版本
  name_add_mac_suffix: true           # 在设备名后附加 MAC 地址，避免多设备冲突
  on_boot:
    - priority: 600                   # 高优先级
      then:
        - bm8563.read_time:
            id: rtc_time              # 从 RTC 读取当前时间

    - priority: -100                  # 低优先级
      then:
        - wait_until: wifi.connected     # 等待 WiFi 连接成功
        - wait_until: api.connected      # 等待 Home Assistant API 连接成功
        - delay: 8s                      # 额外等待 3 秒确保传感器数据同步
        - component.update: m5paper_display

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: '3.1'    # 对应 ESP32-D0WD-V3

# 外部自定义组件（本地路径）
external_components:
  - source:
      type: local
      path: components/           # 自定义组件目录（相对于本 YAML 文件）

# 系统服务：日志、PSRAM、API、OTA
logger:                           # 启用串口日志输出（用于调试）

psram:                            # 启用 PSRAM（M5Paper 有外置 PSRAM，必须开启）

api:                              # 启用 Home Assistant API（支持远程控制和状态同步）

ota:
  - platform: esphome

# WiFi 设置
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: "HIGH"           # 深度节能（功耗低，稳定性差）

# 全局变量
globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'

# 字体配置
font:
  - file:
      type: gfonts                  # 字体来源：谷歌字体
      family: "Noto Sans SC"        # 字体家族：思源黑体（简体中文）
      weight: 400                   # 字重：常规（Regular，400）
      italic: false                 # 非斜体
    id: cn_font                     # 字体唯一ID
    size: 36                        # 字号：36
    glyphs: ${allowed_characters}   # 只加载指定字符
    ignore_missing_glyphs: true     # 忽略字体中缺失的字符，不报错
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: big_font
    size: 56
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true

# SPI 总线
spi:
  clk_pin: GPIO14                 # SPI 时钟引脚
  mosi_pin: GPIO12                # MOSI
  miso_pin: GPIO13                # MISO

# I2C 总线
i2c:
  sda: GPIO21                     # I2C 数据线
  scl: GPIO22                     # I2C 时钟线

# 显示屏：M5Paper ePaper（基于 IT8951 驱动芯片）
display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15                # 片选引脚
    reset_pin: GPIO23             # 复位引脚
    busy_pin: GPIO27              # 忙信号引脚
    rotation: 0                   # 屏幕旋转角度，0是横向
    reversed: False               # 不反转颜色
    update_interval: never        # 不自动刷新，仅手动更新
    # 在屏幕上绘制内容
    lambda: |-
      const int menu_width = 180;  // 左侧菜单宽度
      const int content_x = menu_width + 10;
      const int content_width = it.get_width() - menu_width - 20;

      // === 绘制边框 ===
      it.rectangle(5, 5, it.get_width() - 10, it.get_height() - 10);

      // === 左侧菜单 ===
      it.rectangle(0, 0, menu_width, it.get_height()); // 背景色区分
      it.print(menu_width / 2, 100, id(cn_font), TextAlign::CENTER, "欢迎");
      it.print(menu_width / 2, 200, id(cn_font), TextAlign::CENTER, "环境");

      // === 右侧内容区 ===
      int page = id(current_page);
      if (page == 0) {
        // ===== 页面1：欢迎 =====
        it.print(content_x + content_width / 2, 50, id(big_font), TextAlign::TOP_CENTER, "你好，M5Paper！");
        
        // 电量
        float v_bat = id(m5paper_battery_voltage).state;
        if (!isnan(v_bat)) {
          constexpr float min_v = 3.52f, max_v = 4.15f;
          float pct = (v_bat - min_v) / (max_v - min_v) * 100.0f;
          pct = clamp(pct, 0.0f, 100.0f);
          it.printf(content_x + content_width / 2, 150, id(cn_font), TextAlign::TOP_CENTER, "电量：%.0f%%", pct);
        } else {
          it.print(content_x + content_width / 2, 150, id(cn_font), TextAlign::TOP_CENTER, "电量：--%");
        }

        // 时间
        it.strftime(content_x + content_width / 2, 220, id(cn_font), TextAlign::TOP_CENTER, "%Y-%m-%d %H:%M", id(rtc_time).now());

      } else if (page == 1) {
        // ===== 页面2：环境 =====
        it.print(content_x + content_width / 2, 80, id(big_font), TextAlign::TOP_CENTER, "环境信息");

        // 本机温湿度
        if (!isnan(id(m5paper_temperature).state) && !isnan(id(m5paper_humidity).state)) {
          it.printf(content_x + content_width / 2, 180, id(cn_font), TextAlign::TOP_CENTER, 
                    "温度：%.1f℃  湿度：%.1f%%", 
                    id(m5paper_temperature).state, id(m5paper_humidity).state);
        } else {
          it.print(content_x + content_width / 2, 180, id(cn_font), TextAlign::TOP_CENTER, "温湿度：--");
        }
      }

# 触摸屏：GT911 电容触摸芯片
touchscreen:
  - platform: gt911
    display: m5paper_display      # 关联到显示屏
    id: gt911_touchscreen         # 触摸屏 ID
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true
    on_touch:
      then:
        # 触摸测试
        - lambda: |-
            // 获取触摸坐标（已变换）
            int x = touch.x;
            int y = touch.y;

            const int menu_width = 180;

            // 只响应左侧菜单区域
            if (x < menu_width) {
              if (y >= 80 && y <= 160) {
                // 点击“欢迎”区域
                id(current_page) = 0;
              } else if (y >= 180 && y <= 260) {
                // 点击“环境”区域
                id(current_page) = 1;
              }

              // 触发屏幕刷新
              id(m5paper_display)->update();
            }


# 时间同步配置
time:
  - platform: homeassistant       # 从 Home Assistant 获取网络时间
    id: homeassistant_time
    timezone: Asia/Shanghai        # 时区设置
    on_time_sync:
      - bm8563.write_time         # 时间同步成功后，写入 RTC （BM8563）
  - platform: bm8563              # 使用 BM8563 实时时钟（I2C 接口）
    id: rtc_time
    on_time:
      - seconds: 0                # 每整分钟（秒=0）触发
        then:
          - component.update: m5paper_display   # 刷新屏幕显示新时间

# M5Paper 电源管理（控制主电/电池切换）
m5paper:
  battery_power_pin: GPIO5        # 电池供电使能引脚
  main_power_pin: GPIO2           # 外部电源检测引脚

# 传感器配置
sensor:
  # 电池电压检测（通过 ADC 读取）
  - platform: adc
    disabled_by_default: true                    # 默认不在 HA 中显示
    pin: GPIO35                                  # ADC 引脚
    name: ${device_name} battery voltage
    id: m5paper_battery_voltage
    update_interval: 60s
    attenuation: 12db                            # 使用 12dB 衰减（支持最高 ~3.9V 输入）
    filters:
      - multiply: 2                              # 分压电阻比为 1:1，所以乘以 2 得到真实电压
  
  # SHT30温湿度传感器（I2C 地址 0x44）
  - platform: sht3xd
    temperature:
      name: ${device_name} temperature
      id: m5paper_temperature
      device_class: "temperature"
      state_class: "measurement"
      icon: mdi:thermometer
    humidity:
      name: ${device_name} humidity
      id: m5paper_humidity
      device_class: "humidity"
      state_class: "measurement"
      icon: mdi:water-percent
    address: 0x44
    update_interval: 10s
  
  # 电池电量百分比（基于电压计算）
  - platform: template
    name: ${device_name} battery level
    id: m5paper_battery_level
    unit_of_measurement: '%'
    device_class: "battery"
    state_class: "measurement"
    icon: mdi:battery-high
    update_interval: 60s
    lambda: |-
      constexpr float min_level = 3.52;   // 电池空载截止电压（约 0%）
      constexpr float max_level = 4.15;   // 电池满电电压（约 100%）
      return ((id(m5paper_battery_voltage).state - min_level) / (max_level - min_level)) * 100.00;
    filters:
      - clamp:
          min_value: 0
          max_value: 100


