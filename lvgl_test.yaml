# 全局变量
substitutions:
  device_name: m5paper
  friendly_name: M5paper esphome
  allowed_characters: |-
    一二三四五六七八九十百千万亿温湿度时间分秒你好世界我他和开心快乐电量欢迎环境信息·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  name_add_mac_suffix: true
  on_boot:
    - priority: 600                   # 高优先级
      then:
        - bm8563.read_time:
            id: rtc_time              # 从 RTC 读取当前时间

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: '3.1'

external_components:
  - source:
      type: local
      path: components/

logger:
psram:
api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: "HIGH"

globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'

font:
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: cn_font
    size: 36
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: big_font
    size: 56
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

i2c:
  sda: GPIO21
  scl: GPIO22

display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15
    reset_pin: GPIO23
    busy_pin: GPIO27
    rotation: 0                  # 横屏：960x540
    reversed: true              # 反转颜色
    update_interval: never       # 不自动刷新
    auto_clear_enabled: false

time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: Asia/Shanghai
    on_time_sync:
      - bm8563.write_time
  - platform: bm8563
    id: rtc_time
    on_time:
      - seconds: 0
        then:
          - lvgl.update

m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

sensor:
  - platform: adc
    disabled_by_default: true
    pin: GPIO35
    name: ${device_name} battery voltage
    id: m5paper_battery_voltage
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2

  - platform: sht3xd
    temperature:
      name: ${device_name} temperature
      id: m5paper_temperature
      device_class: "temperature"
      state_class: "measurement"
      icon: mdi:thermometer
    humidity:
      name: ${device_name} humidity
      id: m5paper_humidity
      device_class: "humidity"
      state_class: "measurement"
      icon: mdi:water-percent
    address: 0x44
    update_interval: 10s

  - platform: template
    name: ${device_name} battery level
    id: m5paper_battery_level
    unit_of_measurement: '%'
    device_class: "battery"
    state_class: "measurement"
    icon: mdi:battery-high
    update_interval: 60s
    lambda: |-
      constexpr float min_level = 3.52;
      constexpr float max_level = 4.15;
      return ((id(m5paper_battery_voltage).state - min_level) / (max_level - min_level)) * 100.00;
    filters:
      - clamp:
          min_value: 0
          max_value: 100

# LVGL 配置
lvgl:
  displays:
    - m5paper_display
  update_when_display_idle: true
  default_font: cn_font

  # 全局主题：浅色模式（白底黑字）
  theme:
    dark_mode: false

  # 样式定义：可复用的样式
  style_definitions:
    - id: page_bg
      bg_color: 0xFFFFFF       # 页面纯白背景
      pad_all: 20              # 页面整体内边距

    - id: card_style
      bg_color: 0xF5F5F5       # 卡片淡灰背景，便于区分
      border_side:             # 四个方向都显示，实现全边框
        - TOP
        - BOTTOM
        - LEFT
        - RIGHT
      border_color: 0xDDDDDD
      border_width: 1
      radius: 12               # 圆角卡片
      pad_all: 16              # 卡片内边距

    - id: big_label
      text_color: 0x000000
      text_font: big_font

    - id: normal_label
      text_color: 0x333333
      text_font: cn_font

  pages:
    - id: main_page
      styles: page_bg          # 页面底色和内边距
      layout:
        type: FLEX
        flex_flow: COLUMN
        pad_row: 10            # 卡片之间的垂直间距

      widgets:
        # ===== 日期时间卡片 =====
        - obj:
            id: date_card
            width: 100%        # 宽度撑满页面
            height: 100px      # 给卡片一个固定高度
            styles: card_style
            layout:
              type: GRID
              grid_rows: [fr(1), fr(1)]     # 两行等分
              grid_columns: [fr(1)]         # 一列
              pad_row: 4                    # 日期和时间之间的间距
            widgets:
              - label:
                  id: date_label
                  text: "2026年01月01日 星期四"
                  styles: big_label
                  align: CENTER
              - label:
                  id: time_label
                  text: "00:00"
                  styles: big_label
                  align: CENTER

        # ===== 本机信息卡片 =====
        - obj:
            id: device_card
            width: 100%
            height: 80px       # 给卡片一个固定高度
            styles: card_style
            layout:
              type: GRID
              grid_rows: [fr(1)]            # 一行
              grid_columns: [fr(1), fr(1), fr(1)]  # 三等分列
              pad_column: 8                 # 信息列之间的间距
            widgets:
              - label:
                  id: device_temp
                  text: "温度: 25.1℃"
                  styles: normal_label
                  align: CENTER
              - label:
                  id: device_humi
                  text: "湿度: 60.0%"
                  styles: normal_label
                  align: CENTER
              - label:
                  id: device_voltage
                  text: "电压: 4.20V"
                  styles: normal_label
                  align: CENTER