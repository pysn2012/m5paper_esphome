# 全局变量
substitutions:
  device_name: m5paper
  friendly_name: M5paper esphome lvgl

  # 允许显示的字符集
  allowed_characters: |-
    一二三四五六七八九十百千万亿温湿度时间分秒你好世界我他和开心快乐电量欢迎环境信息·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?

# ESPHome 核心配置
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  name_add_mac_suffix: true
  on_boot:
    - priority: 600
      then:
        - bm8563.read_time:
            id: rtc_time
    - priority: -100
      then:
        - wait_until: wifi.connected
        - wait_until: api.connected
        - delay: 8s
        - component.update: m5paper_display

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: '3.1'

# 外部组件
external_components:
  - source:
      type: local
      path: components/

# 系统服务
logger:
psram:
api:
ota:
  - platform: esphome

# WiFi
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: "HIGH"

# SPI
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

# I2C
i2c:
  sda: GPIO21
  scl: GPIO22

# --------------------------
# 字体
# --------------------------
font:
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: cn_font
    size: 36
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true

  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: big_font
    size: 56
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true

# --------------------------
# 显示屏（必须关闭自动清除）
# --------------------------
display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15
    reset_pin: GPIO23
    busy_pin: GPIO27
    rotation: 0
    reversed: False
    update_interval: never
    auto_clear_enabled: false   # LVGL 必须关闭

# --------------------------
# 触摸屏
# --------------------------
touchscreen:
  - platform: gt911
    id: gt911_touchscreen
    display: m5paper_display
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true

# --------------------------
# 时间
# --------------------------
time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: Asia/Shanghai
    on_time_sync:
      - bm8563.write_time
  - platform: bm8563
    id: rtc_time
    on_time:
      - seconds: 0
        then:
          - component.update: m5paper_display

# --------------------------
# M5Paper 电源
# --------------------------
m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

# --------------------------
# 传感器
# --------------------------
sensor:
  - platform: adc
    disabled_by_default: true
    pin: GPIO35
    id: m5paper_battery_voltage
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2

  - platform: sht3xd
    temperature:
      id: m5paper_temperature
    humidity:
      id: m5paper_humidity
    address: 0x44
    update_interval: 10s

  - platform: template
    name: "电池电量"
    id: m5paper_battery_level
    unit_of_measurement: '%'
    device_class: battery
    update_interval: 60s
    lambda: |-
      constexpr float min_v = 3.52f;
      constexpr float max_v = 4.15f;
      float pct = (id(m5paper_battery_voltage).state - min_v) / (max_v - min_v) * 100;
      return clamp(pct, 0.0f, 100.0f);

# --------------------------
# LVGL 核心配置（最终无错版）
# --------------------------
lvgl:
  displays:
    - m5paper_display
  touchscreens:
    - touchscreen_id: gt911_touchscreen
  buffer_size: 100%
  rotation: 0

  pages:
    - id: page_welcome
      layout: horizontal
      widgets:
        # 左侧菜单
        - container:
            width: 180
            height: 100%
            bg_color: 0x000000
            bg_opa: 5%
            widgets:
              - button:
                  id: btn_welcome
                  align: TOP_MID
                  y: 100
                  width: 160
                  height: 70
                  on_click:
                    - lvgl.page.show: page_welcome
                  widgets:
                    - label:
                        text: "欢迎"
                        align: center
                        text_font: cn_font

              - button:
                  id: btn_env
                  align: TOP_MID
                  y: 200
                  width: 160
                  height: 70
                  on_click:
                    - lvgl.page.show: page_env
                  widgets:
                    - label:
                        text: "环境"
                        align: center
                        text_font: cn_font

        # 右侧欢迎页内容
        - container:
            width: 100%
            height: 100%
            pad_left: 10
            widgets:
              - label:
                  text: "你好，M5Paper！"
                  align: TOP_MID
                  y: 50
                  text_font: big_font

              - label:
                  id: label_battery
                  align: TOP_MID
                  y: 150
                  text_font: cn_font

              - label:
                  id: label_time
                  align: TOP_MID
                  y: 220
                  text_font: cn_font

    # 环境页面
    - id: page_env
      layout: horizontal
      widgets:
        - container:
            width: 180
            height: 100%
            bg_color: 0x000000
            bg_opa: 5%
            widgets:
              - button:
                  align: TOP_MID
                  y: 100
                  width: 160
                  height: 70
                  on_click:
                    - lvgl.page.show: page_welcome
                  widgets:
                    - label:
                        text: "欢迎"
                        align: center
                        text_font: cn_font

              - button:
                  align: TOP_MID
                  y: 200
                  width: 160
                  height: 70
                  on_click:
                    - lvgl.page.show: page_env
                  widgets:
                    - label:
                        text: "环境"
                        align: center
                        text_font: cn_font

        - container:
            width: 100%
            height: 100%
            pad_left: 10
            widgets:
              - label:
                  text: "环境信息"
                  align: TOP_MID
                  y: 80
                  text_font: big_font

              - label:
                  id: label_th
                  align: TOP_MID
                  y: 180
                  text_font: cn_font

# --------------------------
# 自动刷新 LVGL 标签内容
# --------------------------
interval:
  - interval: 10s
    then:
      # 更新电量
      - lvgl.label.update:
          id: label_battery
          text_format: "电量：%.0f%%"
          args: [ 'id(m5paper_battery_level).state' ]

      # 更新时间
      - lvgl.label.update:
          id: label_time
          strftime: "%Y-%m-%d %H:%M"
          time_id: rtc_time

      # 更新温湿度
      - lvgl.label.update:
          id: label_th
          text_format: "温度：%.1f℃  湿度：%.1f%%"
          args: [ 'id(m5paper_temperature).state', 'id(m5paper_humidity).state' ]