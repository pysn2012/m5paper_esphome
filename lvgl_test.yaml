# 全局变量
substitutions:
  device_name: m5paper
  friendly_name: M5paper esphome
  allowed_characters: |-
    一二三四五六七八九十百千万亿温湿度时间分秒你好世界我他和开心快乐电量欢迎环境信息·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  name_add_mac_suffix: true

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: '3.1'

external_components:
  - source:
      type: local
      path: components/

logger:
psram:
api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: "HIGH"

globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'

font:
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: cn_font
    size: 36
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: big_font
    size: 56
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

i2c:
  sda: GPIO21
  scl: GPIO22

display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15
    reset_pin: GPIO23
    busy_pin: GPIO27
    rotation: 0          # 横屏：960x540
    reversed: False
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: gt911
    display: m5paper_display
    id: gt911_touchscreen
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true
    on_touch:
      then:
        - if:
            condition:
              lambda: return touch.x < 180 && touch.y >= 80 && touch.y <= 160;
            then:
              - lvgl.page.show: welcome_page
        - if:
            condition:
              lambda: return touch.x < 180 && touch.y >= 180 && touch.y <= 260;
            then:
              - lvgl.page.show: environment_page

time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: Asia/Shanghai
    on_time_sync:
      - bm8563.write_time
  - platform: bm8563
    id: rtc_time
    on_time:
      - seconds: 0
        then:
          - lvgl.update

m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

sensor:
  - platform: adc
    disabled_by_default: true
    pin: GPIO35
    name: ${device_name} battery voltage
    id: m5paper_battery_voltage
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2

  - platform: sht3xd
    temperature:
      name: ${device_name} temperature
      id: m5paper_temperature
      device_class: "temperature"
      state_class: "measurement"
      icon: mdi:thermometer
    humidity:
      name: ${device_name} humidity
      id: m5paper_humidity
      device_class: "humidity"
      state_class: "measurement"
      icon: mdi:water-percent
    address: 0x44
    update_interval: 10s

  - platform: template
    name: ${device_name} battery level
    id: m5paper_battery_level
    unit_of_measurement: '%'
    device_class: "battery"
    state_class: "measurement"
    icon: mdi:battery-high
    update_interval: 60s
    lambda: |-
      constexpr float min_level = 3.52;
      constexpr float max_level = 4.15;
      return ((id(m5paper_battery_voltage).state - min_level) / (max_level - min_level)) * 100.00;
    filters:
      - clamp:
          min_value: 0
          max_value: 100

# LVGL 配置（横屏 960x540，白底黑字）
lvgl:
  displays:
    - m5paper_display
  touchscreens:
    - gt911_touchscreen
  update_when_display_idle: true
  color:
    primary: 0x000000      # 黑色文字
    background: 0xFFFFFF   # 白色背景
  default_font: cn_font

  bottom_layer:
    bg_color: 0xFFFFFF     # 底层必须白色

  pages:
    # ===== 页面1：欢迎 =====
    - id: welcome_page
      widgets:
        # 左侧菜单（180px 宽）
        - container:
            x: 0
            y: 0
            width: 180
            height: 540
            bg_color: 0xFFFFFF
            border_width: 1
            border_color: 0xDDDDDD
            widgets:
              - label:
                  x: 90    # 180/2
                  y: 100
                  text: "欢迎"
                  text_color: 0x000000
                  align: TOP_MID
              - label:
                  x: 90
                  y: 200
                  text: "环境"
                  text_color: 0x000000
                  align: TOP_MID

        # 右侧内容（从 x=180 开始，总宽 780）
        - label:
            x: 570   # 180 + (960-180)/2 = 570
            y: 50
            text: "你好，M5Paper！"
            text_color: 0x000000
            text_font: big_font
            align: TOP_MID

        - label:
            id: battery_label
            x: 570
            y: 150
            text: !lambda |-
              float v_bat = id(m5paper_battery_voltage).state;
              if (!isnan(v_bat)) {
                constexpr float min_v = 3.52f, max_v = 4.15f;
                float pct = (v_bat - min_v) / (max_v - min_v) * 100.0f;
                pct = clamp(pct, 0.0f, 100.0f);
                return to_string((int)pct) + "%";
              } else {
                return "--%";
              }
            text_color: 0x000000
            align: TOP_MID

        - label:
            id: time_label
            x: 570
            y: 220
            text: !lambda |-
              return id(rtc_time).now().strftime("%Y-%m-%d %H:%M");
            text_color: 0x000000
            align: TOP_MID

    # ===== 页面2：环境 =====
    - id: environment_page
      widgets:
        # 左侧菜单（同上）
        - container:
            x: 0
            y: 0
            width: 180
            height: 540
            bg_color: 0xFFFFFF
            border_width: 1
            border_color: 0xDDDDDD
            widgets:
              - label:
                  x: 90
                  y: 100
                  text: "欢迎"
                  text_color: 0x000000
                  align: TOP_MID
              - label:
                  x: 90
                  y: 200
                  text: "环境"
                  text_color: 0x000000
                  align: TOP_MID

        - label:
            x: 570
            y: 80
            text: "环境信息"
            text_color: 0x000000
            text_font: big_font
            align: TOP_MID

        - label:
            id: env_info_label
            x: 570
            y: 180
            text: !lambda |-
              if (!isnan(id(m5paper_temperature).state) && !isnan(id(m5paper_humidity).state)) {
                char buffer[60];
                snprintf(buffer, sizeof(buffer), "温度：%.1f℃  湿度：%.1f%%",
                         id(m5paper_temperature).state, id(m5paper_humidity).state);
                return std::string(buffer);
              } else {
                return "温湿度：--";
              }
            text_color: 0x000000
            align: TOP_MID