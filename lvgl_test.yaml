# 全局变量
substitutions:
  device_name: m5paper
  friendly_name: M5paper esphome
  allowed_characters: |-
    一二三四五六七八九十百千万亿温湿度时间分秒你好世界我他和开心快乐电量欢迎环境信息·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  name_add_mac_suffix: true
  on_boot:
    - priority: 600                   # 高优先级
      then:
        - bm8563.read_time:
            id: rtc_time              # 从 RTC 读取当前时间

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: '3.1'

external_components:
  - source:
      type: local
      path: components/

logger:
psram:
api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: "HIGH"

globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'

font:
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: cn_font
    size: 36
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: big_font
    size: 56
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

i2c:
  sda: GPIO21
  scl: GPIO22

display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15
    reset_pin: GPIO23
    busy_pin: GPIO27
    rotation: 0                  # 横屏：960x540
    reversed: true              # 不反转颜色
    update_interval: never       # 不自动刷新
    auto_clear_enabled: false

time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: Asia/Shanghai
    on_time_sync:
      - bm8563.write_time
  - platform: bm8563
    id: rtc_time
    on_time:
      - seconds: 0
        then:
          - lvgl.update

m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

sensor:
  - platform: adc
    disabled_by_default: true
    pin: GPIO35
    name: ${device_name} battery voltage
    id: m5paper_battery_voltage
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2

  - platform: sht3xd
    temperature:
      name: ${device_name} temperature
      id: m5paper_temperature
      device_class: "temperature"
      state_class: "measurement"
      icon: mdi:thermometer
    humidity:
      name: ${device_name} humidity
      id: m5paper_humidity
      device_class: "humidity"
      state_class: "measurement"
      icon: mdi:water-percent
    address: 0x44
    update_interval: 10s

  - platform: template
    name: ${device_name} battery level
    id: m5paper_battery_level
    unit_of_measurement: '%'
    device_class: "battery"
    state_class: "measurement"
    icon: mdi:battery-high
    update_interval: 60s
    lambda: |-
      constexpr float min_level = 3.52;
      constexpr float max_level = 4.15;
      return ((id(m5paper_battery_voltage).state - min_level) / (max_level - min_level)) * 100.00;
    filters:
      - clamp:
          min_value: 0
          max_value: 100

# LVGL 配置
lvgl:
  displays:
    - m5paper_display
  update_when_display_idle: true
  default_font: cn_font

  pages:
    # ===== 页面：欢迎 =====
    - id: main_page
      # 使用 Flex 列布局，自动排列下方各个卡片
      layout:
        type: flex
        flex_flow: COLUMN
        pad_row: 8
        pad_column: 8

      widgets:
        # ===== 日期时间卡片 =====
        - obj:
            id: date_card
            layout:
              type: grid
              grid_rows: [ content, content ]
              grid_columns: [ fr(1) ]
              pad_row: 8
              pad_column: 12

            widgets:
              - label:
                  id: date_label
                  text: "2026年01月01日 星期四"

              - label:
                  id: time_label
                  text: "00:00"

        # ===== 本机信息卡片 =====
        - obj:
            id: device_card
            layout:
              type: grid
              grid_rows: [ content ]
              grid_columns: [ fr(1), fr(1), fr(1) ]
              pad_row: 8
              pad_column: 12

            widgets:
              - label:
                  id: device_temp
                  text: "温度: 25.1℃"

              - label:
                  id: device_humi
                  text: "湿度: 60.0%"

              - label:
                  id: device_voltage
                  text: "电压: 4.20V"



            