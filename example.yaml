substitutions:
  device_name: Test status screen
  device_id: test-screen

esphome:
  name: ${device_id}
  name_add_mac_suffix: true
  on_boot:
    - then:
        # read the RTC time once when the system boots
        - bm8563.read_time:
            id: rtc_time
    - priority: -100
      then:
        - it8951e.clear:
            id: m5paper_display
        - delay: 100ms
        - component.update: m5paper_display

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: esp-idf # esp-idf or arduino
    advanced:
      minimum_chip_revision: '3.1'

# ======================
# 外部自定义组件（本地路径）
# ======================
external_components:
  - source:
      type: local
      path: components/           # 自定义组件目录（相对于本 YAML 文件）

# ======================
# 日志、PSRAM、API、OTA
# ======================
logger:                           # 启用串口日志输出（用于调试）

psram:                            # 启用 PSRAM（M5Paper 有外置 PSRAM，必须开启）

api:                              # 启用 Home Assistant API（支持远程控制和状态同步）

ota:
  - platform: esphome
    password: !secret ota_key     # OTA 无线升级密码（从 secrets.yaml 读取）

# ======================
# WiFi 设置
# ======================
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: "HIGH"

# ======================
# 字体配置（用于屏幕显示）
# ======================
font:
  - file: 'gfonts://Roboto'
    id: normal_font
    size: 40
  - file: "gfonts://Orbitron"
    id: clock_font
    size: 80

# ======================
# SPI 总线（用于 ePaper 屏幕）
# ======================
spi:
  clk_pin: GPIO14                 # SPI 时钟引脚
  mosi_pin: GPIO12                # 主机输出从机输入（MOSI）
  miso_pin: GPIO13                # 主机输入从机输出（MISO，ePaper 可能不用）

# ======================
# I2C 总线（用于 RTC、触摸、温湿度传感器）
# ======================
i2c:
  sda: GPIO21                     # I2C 数据线
  scl: GPIO22                     # I2C 时钟线

# ======================
# 显示屏：M5Paper ePaper（基于 IT8951 驱动芯片）
# ======================
display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15                # 片选引脚（⚠️ 注意：GPIO15 是 strapping 引脚！）
    reset_pin: GPIO23             # 复位引脚
    busy_pin: GPIO27              # 忙信号引脚
    rotation: 90                  # 屏幕旋转 90 度
    reversed: False               # 不反转颜色
    update_interval: never        # 不自动刷新，仅手动更新
    # 在屏幕上绘制内容
    lambda: |-
      it.printf(25, 25, id(normal_font), "%.1f°", id(m5paper_temperature).state);  // 显示温度
      it.strftime(350, 25, id(clock_font), "%H:%M:%S", id(rtc_time).now());       // 显示时间

# ======================
# 触摸屏：GT911 电容触摸芯片
# ======================
touchscreen:
  - platform: gt911               # 使用自定义 GT911 驱动
    display: m5paper_display      # 关联到上面的显示屏（用于坐标映射）
    id: gt911_touchscreen         # 触摸屏 ID
    calibration:
      x_min: 0
      x_max: 540
      y_min: 0
      y_max: 960
    interrupt_pin:
      number: GPIO36
      mode: INPUT                 # ← 显式指定为输入模式
      inverted: false             # GT911 中断低电平有效

switch:
  - platform: restart
    id: restart_switch
    name: ${device_name} Restart

time:
  - platform: homeassistant
    id: homeassistant_time
    timezone: Europe/Paris
    on_time_sync:
      - bm8563.write_time
  - platform: bm8563
    id: rtc_time
    on_time:
      - seconds: 0
        then:
          - component.update: m5paper_display

m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

sensor:
  - platform: adc
    disabled_by_default: true
    pin: GPIO35
    name: ${device_name} battery voltage
    id: m5paper_battery_voltage
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2 #1,27272727
  - platform: sht3xd
    temperature:
      name: ${device_name} temperature
      id: m5paper_temperature
      device_class: "temperature"
      state_class: "measurement"
      icon: mdi:thermometer
    humidity:
      name: ${device_name} humidity
      id: m5paper_humidity
      device_class: "humidity"
      state_class: "measurement"
      icon: mdi:water-percent
    address: 0x44
    update_interval: 10s
  - platform: template
    name: ${device_name} battery level
    id: m5paper_battery_level
    unit_of_measurement: '%'
    device_class: "battery"
    state_class: "measurement"
    icon: mdi:battery-high
    update_interval: 60s
    lambda: |-
      constexpr float min_level = 3.52;
      constexpr float max_level = 4.15;
      return ((id(m5paper_battery_voltage).state - min_level) / (max_level - min_level)) * 100.00;
    filters:
      - clamp:
          min_value: 0
          max_value: 100


