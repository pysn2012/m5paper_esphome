# M5Stack Paper V1.1 ESPHome 配置文件
#

# =============================================================================
# ESPHome 核心配置
# =============================================================================
esphome:
  name: m5paper-test
  friendly_name: M5Paper Test

# =============================================================================
# ESP32 硬件配置
# =============================================================================
esp32:
  board: m5stack-paper
  framework:
    type: esp-idf

# =============================================================================
# WiFi 配置
# =============================================================================
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


# =============================================================================
# Logging 配置
# =============================================================================
logger:
  level: DEBUG
  logs:
    m5paper_display: DEBUG
    spi: DEBUG

# ======================
# 外部自定义组件（本地路径）
# ======================
external_components:
  - source:
      type: local
      path: components/           # 自定义组件目录（相对于本 YAML 文件）
    components: [it8951_driver]

# ======================
# 字体配置（用于屏幕显示）
# ======================
font:
  - file:
      type: gfonts
      family: "Noto Sans SC"      # 使用 Google Fonts 的“思源黑体”
      weight: 400
      italic: false
    id: font1                     # 字体 ID，供 lambda 调用
    size: 20                      # 字号 20
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: large_font                # 大号字体
    size: 40

# ======================
# SPI 总线（用于 ePaper 屏幕）
# ======================
spi:
  clk_pin: GPIO14                 # SPI 时钟引脚
  mosi_pin: GPIO12                # 主机输出从机输入（MOSI）
  miso_pin: GPIO13                # 主机输入从机输出（MISO，ePaper 可能不用）

# ======================
# I2C 总线（用于 RTC、触摸、温湿度传感器）
# ======================
i2c:
  sda: GPIO21                     # I2C 数据线
  scl: GPIO22                     # I2C 时钟线

# =============================================================================
# M5Paper 显示屏配置
# =============================================================================
display:
  - platform: it8951_driver       # 使用自定义的 IT8951 ePaper 驱动
    id: m5paper_display           # 组件 ID，供其他地方引用
    display_cs_pin: GPIO15        # 片选引脚
    reset_pin: GPIO23             # 复位引脚
    busy_pin: GPIO27              # 忙信号引脚
    rotation: 90                  # 屏幕旋转 90 度
    reversed: False               # 不反转颜色
    update_interval: "never"      # 不自动刷新，仅手动更新

    # 显示内容的Lambda表达式
    lambda: |-
      // 清屏为白色背景
      it.fill(COLOR_OFF);

      // 绘制边框
      it.rectangle(10, 10, it.get_width() - 20, it.get_height() - 20);

      // 绘制标题
      it.print(it.get_width() / 2, 50, id(title_font),
               TextAlign::TOP_CENTER, "M5Paper V1.1");

      // 绘制副标题
      it.print(it.get_width() / 2, 100, id(subtitle_font),
               TextAlign::TOP_CENTER, "ESPHome IT8951E Driver");

      // 绘制填充矩形
      it.filled_rectangle(50, 200, 200, 100);

      // 绘制空心矩形
      it.rectangle(300, 200, 200, 100);

      // 在不同位置绘制文本
      it.print(0, 350, id(body_font), "Update Count:");

      // 打印动态值（实际使用中需要配合传感器）
      it.printf(it.get_width(), 350, id(body_font),
                TextAlign::TOP_RIGHT, "%d", id(m5paper_screen).get_update_count());

      // 绘制进度指示器
      int progress = 75;  // Example progress value
      it.filled_rectangle(50, 400, (it.get_width() - 100) * progress / 100, 30);
      it.rectangle(50, 400, it.get_width() - 100, 30);

      // 绘制状态文本
      it.print(it.get_width() / 2, 450, id(body_font),
               TextAlign::TOP_CENTER, "Status: Running");


