# M5Paper V1.1 简单测试配置
#

esphome:
  name: m5paper-simple-test
  friendly_name: M5Paper Simple Test
  comment: "Simple test for M5Paper V1.1 display driver" # 备注：M5Paper V1.1 显示驱动简单测试

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG

# 简单显示测试 - 无旋转，基础图形和文字
display:
  - platform: m5paper_display
    id: m5paper_test

    # Use default pins for M5Stack Paper V1.1
    cs_pin: GPIO15
    busy_pin: GPIO27
    reset_pin: GPIO4
    mosi_pin: GPIO12
    miso_pin: GPIO13
    sck_pin: GPIO14

    # Basic settings
    rotation: 0
    update_mode: GC16
    clear_on_startup: true

    # 每30秒更新一次屏幕
    update_interval: 30s

    lambda: |-
      // 填充背景
      it.fill(COLOR_OFF);

      // 绘制边框
      it.rectangle(5, 5, it.get_width() - 10, it.get_height() - 10);

      // 打印测试消息
      it.print(it.get_width() / 2, 50,
               id(test_font),
               TextAlign::TOP_CENTER,
               "M5Paper Test");

      // 绘制矩形
      it.filled_rectangle(20, 120, 100, 60);
      it.rectangle(140, 120, 100, 60);

      // 绘制文字
      it.print(70, 200, id(test_font), TextAlign::TOP_CENTER, "Filled");
      it.print(190, 200, id(test_font), TextAlign::TOP_CENTER, "Border");

      // 绘制圆形
      it.filled_circle(70, 300, 40);
      it.circle(190, 300, 40);

      // 绘制线条
      it.line(20, 400, 260, 400);
      it.line(20, 420, 260, 420);
      it.line(20, 440, 260, 440);

      // 进度条
      int progress = 75;
      it.filled_rectangle(20, 480, (it.get_width() - 40) * progress / 100, 20);
      it.rectangle(20, 480, it.get_width() - 40, 20);
      it.printf(it.get_width() / 2, 480, id(small_font),
               TextAlign::TOP_CENTER, "%d%%", progress);

# Fonts for testing
font:
  - id: test_font
    file: "fonts/NotoSans-Regular.ttf"
    size: 24

  - id: small_font
    file: "fonts/NotoSans-Regular.ttf"
    size: 16

# 启用OTA无线上传固件
ota:
  password: !secret ota_password
