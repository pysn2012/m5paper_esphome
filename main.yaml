# 全局变量
substitutions:
  device_name: m5paper
  friendly_name: M5paper esphome

  # 允许显示的字符集
  allowed_characters: |-
    一二三四五六七八九十百千万亿星期温度湿时间日分秒你好世界我他和开心快乐总电量客厅卧室热水器冰箱冷冻藏排插本机功率·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?
 
# ESPHome 核心配置
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0               # 要求的最低 ESPHome 版本
  name_add_mac_suffix: true           # 在设备名后附加 MAC 地址，避免多设备冲突
  on_boot:
    - priority: 600                   # 高优先级
      then:
        - bm8563.read_time:
            id: rtc_time              # 从 RTC 读取当前时间

    - priority: -100
      then:
        - wait_until: wifi.connected     # 等待 WiFi 连接成功
        - wait_until: api.connected      # 等待 Home Assistant API 连接成功
        - delay: 2s                      # 额外等待 3 秒
        # 👇 手动触发所有本地传感器更新
        - sensor.update: m5paper_battery_voltage
        - sensor.update: m5paper_temperature
        - sensor.update: m5paper_humidity
        - delay: 2s
        - lambda: |-
            // 强制重新计算电池百分比
            id(m5paper_battery_level).update();
        - delay: 500ms
        - component.update: m5paper_display
        - delay: 3s                      # 留出屏幕刷新完成时间
        - deep_sleep.enter: deep_sleep_10min  # ⭐ 关键：进入深度睡眠

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: '3.1'    # 对应 ESP32-D0WD-V3

# 外部自定义组件（本地路径）
external_components:
  - source:
      type: local
      path: components/           # 自定义组件目录（相对于本 YAML 文件）

# 系统服务：日志、PSRAM、API、OTA
logger:                           # 启用串口日志输出（用于调试）

psram:                            # 启用 PSRAM（M5Paper 有外置 PSRAM，必须开启）

api:                              # 启用 Home Assistant API（支持远程控制和状态同步）

ota:
  - platform: esphome

# WiFi 设置
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # power_save_mode: "HIGH"           # 深度节能（功耗低，稳定性差）

# 字体配置
font:
  - file:
      type: gfonts                  # 字体来源：谷歌字体
      family: "Noto Sans SC"        # 字体家族：思源黑体（简体中文）
      weight: 400                   # 字重：常规（Regular，400）
      italic: false                 # 非斜体
    id: cn_font                     # 字体唯一ID
    size: 36                        # 字号：36
    glyphs: ${allowed_characters}   # 只加载指定字符
    ignore_missing_glyphs: true     # 忽略字体中缺失的字符，不报错
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: big_font
    size: 56
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true
  - file: "gfonts://Material+Symbols+Outlined"
    id: icons_gfont
    size: 36
    glyphs: ["\U0000e425"] # mdi-timer
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_font
    size: 36
    glyphs:
      - "\U000F007A"  # 10%
      - "\U000F007B"  # 20%
      - "\U000F007C"  # 30%
      - "\U000F007D"  # 40%
      - "\U000F007E"  # 50%
      - "\U000F007F"  # 60%
      - "\U000F0080"  # 70%
      - "\U000F0081"  # 80%
      - "\U000F0082"  # 90%
      - "\U000F0079"  # 满电量
      - "\U000F02DC"  # 小房子
      - "\U000F050F"  # 温度计
      - "\U000F058E"  # 湿度
      - "\U000F0290"  # 冰箱
      - "\U000F02E3"  # 卧室
      - "\U000F140B"  # 闪电
      - "\U000F1A57"  # 电量

# SPI 总线
spi:
  clk_pin: GPIO14                 # SPI 时钟引脚
  mosi_pin: GPIO12                # MOSI
  miso_pin: GPIO13                # MISO

# I2C 总线
i2c:
  sda: GPIO21                     # I2C 数据线
  scl: GPIO22                     # I2C 时钟线

# 显示屏：M5Paper ePaper（基于 IT8951 驱动芯片）
display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15                # 片选引脚
    reset_pin: GPIO23             # 复位引脚
    busy_pin: GPIO27              # 忙信号引脚
    rotation: 0                   # 屏幕旋转角度，0是横向
    reversed: False               # 不反转颜色
    update_interval: never        # 不自动刷新，仅手动更新
    # 在屏幕上绘制内容
    lambda: |-
      // === 1. 顶部时间（大字居中）===
      it.strftime(it.get_width() / 2, 20, id(big_font), TextAlign::TOP_CENTER, "%Y-%m-%d %H:%M", id(rtc_time).now());

      // === 2. 星期（紧接时间下方，小字居中）===
      auto wday = id(rtc_time).now().strftime("%w");
      const char* weekdays[] = {"星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"};
      int wd = std::min(6, std::max(0, (int)std::stoi(wday)));
      it.print(it.get_width() / 2, 90, id(cn_font), TextAlign::TOP_CENTER, weekdays[wd]);

      // === 3. 电池图标（右上角）===
      float bat_pct = id(m5paper_battery_level).state;
      const char* bat_icon = "\U000F007A"; // 10% (最低)
      if (!isnan(bat_pct)) {
        if (bat_pct >= 95) bat_icon = "\U000F0079"; // 满电
        else if (bat_pct >= 85) bat_icon = "\U000F0082"; // 90%
        else if (bat_pct >= 75) bat_icon = "\U000F0081"; // 80%
        else if (bat_pct >= 65) bat_icon = "\U000F0080"; // 70%
        else if (bat_pct >= 55) bat_icon = "\U000F007F"; // 60%
        else if (bat_pct >= 45) bat_icon = "\U000F007E"; // 50%
        else if (bat_pct >= 35) bat_icon = "\U000F007D"; // 40%
        else if (bat_pct >= 25) bat_icon = "\U000F007C"; // 30%
        else if (bat_pct >= 15) bat_icon = "\U000F007B"; // 20%
        else bat_icon = "\U000F007A"; // 10%
      }
      it.print(it.get_width() - 10, 25, id(icons_font), TextAlign::TOP_RIGHT, bat_icon);

      // 起始 Y 坐标（从 140 开始逐行向下）
      int y_offset = 140;
      const int line_height = 50;

      // === 4. 客厅温湿度 ===
      if (!isnan(id(xiaomi_temp).state) && !isnan(id(xiaomi_humi).state)) {
        it.print(30, y_offset, id(icons_font), TextAlign::TOP_LEFT, "\U000F02DC"); // 小房子
        it.printf(80, y_offset, id(cn_font), TextAlign::TOP_LEFT, "客厅：温度 %.1f℃ / 湿度 %.1f%%", id(xiaomi_temp).state, id(xiaomi_humi).state);
        y_offset += line_height;
      }

      // === 5. 卧室温湿度 ===
      if (!isnan(id(qp_temp).state) && !isnan(id(qp_humi).state)) {
        it.print(30, y_offset, id(icons_font), TextAlign::TOP_LEFT, "\U000F02E3"); // 卧室
        it.printf(80, y_offset, id(cn_font), TextAlign::TOP_LEFT, "卧室：温度 %.1f℃ / 湿度 %.1f%%", id(xiaomi_temp).state, id(xiaomi_humi).state);
        y_offset += line_height;
      }

      // === 6. 冰箱温度（冷藏 + 冷冻）===
      if (!isnan(id(icebox_temp01).state) && !isnan(id(icebox_temp02).state)) {
        it.print(30, y_offset, id(icons_font), TextAlign::TOP_LEFT, "\U000F0290"); // 冰箱
        it.printf(80, y_offset, id(cn_font), TextAlign::TOP_LEFT, "冰箱：冷藏 %.1f℃ / 冷冻 %.1f℃", id(icebox_temp01).state, id(icebox_temp02).state);
        y_offset += line_height;
      }

      // === 7. 排插功率 & 总电量 ===
      bool has_power = !isnan(id(cmpower_power).state);
      bool has_energy = !isnan(id(total_power).state);
      if (has_power || has_energy) {
        it.print(30, y_offset, id(icons_font), TextAlign::TOP_LEFT, "\U000F140B"); // 闪电（代表电力）
        char buf[100] = "排插：";
        if (has_power) {
          sprintf(buf + strlen(buf), "功率 %.1fW", id(cmpower_power).state);
        } else {
          strcat(buf, "--W");
        }
        if (has_energy) {
          sprintf(buf + strlen(buf), " / 总电量 %.1fkWh", id(total_power).state / 1000.0f);
        }
        it.print(80, y_offset, id(cn_font), TextAlign::TOP_LEFT, buf);
        y_offset += line_height;
      }

      it.print(30, 400, id(icons_gfont), TextAlign::TOP_LEFT, "\U0000e425"); // 测试

      // === 8. 本机温湿度（固定在底部）===
      if (!isnan(id(m5paper_temperature).state) && !isnan(id(m5paper_humidity).state)) {
        it.print(30, 480, id(icons_font), TextAlign::TOP_LEFT, "\U000F050F"); // 温度计
        it.printf(80, 480, id(cn_font), TextAlign::TOP_LEFT, "本机：湿度 %.1f℃ / 湿度 %.0f%%", id(m5paper_temperature).state, id(m5paper_humidity).state);
      }
          
      // 边框
      it.rectangle(10, 10, it.get_width() - 20, it.get_height() - 20);

# 重启开关
switch:
  - platform: restart
    id: restart_switch
    name: ${device_name} Restart

# 深度睡眠配置（基于 BM8563 RTC 定时唤醒）
deep_sleep:
  id: deep_sleep_10min
  run_duration: 40s      # 唤醒后最多运行 40 秒（足够完成联网+刷新）
  sleep_duration: 10min   # 睡眠 10 分钟

# 时间同步配置
time:
  - platform: homeassistant       # 从 Home Assistant 获取网络时间
    id: homeassistant_time
    timezone: Asia/Shanghai        # 时区设置
    on_time_sync:
      - bm8563.write_time         # 时间同步成功后，写入 RTC （BM8563）
  - platform: bm8563              # 使用 BM8563 实时时钟（I2C 接口）
    id: rtc_time

# M5Paper 电源管理（控制主电/电池切换）
m5paper:
  battery_power_pin: GPIO5        # 电池供电使能引脚
  main_power_pin: GPIO2           # 外部电源检测引脚

# 传感器配置
sensor:
  # 电池电压检测（通过 ADC 读取）
  - platform: adc
    disabled_by_default: true                    # 默认不在 HA 中显示
    pin: GPIO35                                  # ADC 引脚
    name: ${device_name} battery voltage
    id: m5paper_battery_voltage
    # update_interval: 60s
    attenuation: 12db                            # 使用 12dB 衰减（支持最高 ~3.9V 输入）
    filters:
      - multiply: 2                              # 分压电阻比为 1:1，所以乘以 2 得到真实电压
  
  # SHT30温湿度传感器（I2C 地址 0x44）
  - platform: sht3xd
    temperature:
      name: ${device_name} temperature
      id: m5paper_temperature
      device_class: "temperature"
      state_class: "measurement"
      icon: mdi:thermometer
    humidity:
      name: ${device_name} humidity
      id: m5paper_humidity
      device_class: "humidity"
      state_class: "measurement"
      icon: mdi:water-percent
    address: 0x44
    # update_interval: 60s
  
  # 电池电量百分比（基于电压计算）
  - platform: template
    name: ${device_name} battery level
    id: m5paper_battery_level
    unit_of_measurement: '%'
    device_class: "battery"
    state_class: "measurement"
    icon: mdi:battery-high
    # update_interval: 60s
    lambda: |-
      constexpr float min_level = 3.52;   // 电池空载截止电压（约 0%）
      constexpr float max_level = 4.15;   // 电池满电电压（约 100%）
      return ((id(m5paper_battery_voltage).state - min_level) / (max_level - min_level)) * 100.00;
    filters:
      - clamp:
          min_value: 0
          max_value: 100

  # 小米温湿度计
  - platform: homeassistant
    name: xiaomi temperature
    entity_id: sensor.cleargras_cn_blt_3_u5c2qgggk400_dk1_temperature_p_2_1
    id: xiaomi_temp
    unit_of_measurement: "°C"
  - platform: homeassistant
    name: xiaomi humidity
    id: xiaomi_humi
    entity_id: sensor.cleargras_cn_blt_3_u5c2qgggk400_dk1_relative_humidity_p_2_2

  # 青萍温湿度计
  - platform: homeassistant
    name: qingping temperature
    entity_id: sensor.cgllc_cn_blt_3_1mitqg1roc800_dove_temperature_p_2_1
    id: qp_temp
    unit_of_measurement: "°C"
  - platform: homeassistant
    name: qingping humidity
    id: qp_humi
    entity_id: sensor.cgllc_cn_blt_3_1mitqg1roc800_dove_relative_humidity_p_2_2

  # 冰箱温度
  - platform: homeassistant
    name: icebox temp01
    entity_id: sensor.viomi_cn_246891354_u37_temperature_p_3_1
    id: icebox_temp01
    unit_of_measurement: "°C"
  - platform: homeassistant
    name: icebox temp02
    entity_id: sensor.viomi_cn_246891354_u37_temperature_p_4_1
    id: icebox_temp02
    unit_of_measurement: "°C"

  # 排插功率
  - platform: homeassistant
    name: cmpower power
    entity_id: sensor.cmpower_w1_270cee_24_gong_lu
    id: cmpower_power
    unit_of_measurement: "W"
  - platform: homeassistant
    name: total power
    entity_id: sensor.cmpower_w1_270cee_29_zong_dian_liang
    id: total_power
    unit_of_measurement: "Wh"


