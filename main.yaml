# 全局变量
substitutions:
  device_name: m5paper
  friendly_name: M5paper esphome

  # 允许显示的字符集
  allowed_characters: |-
    一二三四五六七八九十百千万亿星期温度湿时间日分秒你好世界我他和开心快乐总电量客厅卧室热水器冰箱冷冻藏排插本机功率运行池压流阻厦门·！@#￥%…&*（）—+-=、|【{}】；：‘“”，《。》/？℃℉￡ abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890~`!$^()_[]\;:'",<.>?
 
# ESPHome 核心配置
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0               # 要求的最低 ESPHome 版本
  name_add_mac_suffix: true           # 在设备名后附加 MAC 地址，避免多设备冲突
  on_boot:
    - priority: 600                   # 高优先级
      then:
        - bm8563.read_time:
            id: rtc_time              # 从 RTC 读取当前时间

    - priority: -100
      then:
        - wait_until: wifi.connected     # 等待 WiFi 连接成功
        - wait_until: api.connected      # 等待 Home Assistant API 连接成功
        - delay: 5s                      # 额外等待 5 秒
        - component.update: m5paper_display
        - delay: 3s                      # 留出屏幕刷新完成时间
        - deep_sleep.enter: deep_sleep_10min  # ⭐ 关键：进入深度睡眠

esp32:
  board: m5stack_paper
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: '3.1'    # 对应 ESP32-D0WD-V3

# 外部自定义组件（本地路径）
external_components:
  - source:
      type: local
      path: components/           # 自定义组件目录（相对于本 YAML 文件）

# 系统服务：日志、PSRAM、API、OTA
logger:                           # 启用串口日志输出（用于调试）

psram:                            # 启用 PSRAM（M5Paper 有外置 PSRAM，必须开启）

api:                              # 启用 Home Assistant API（支持远程控制和状态同步）

ota:
  - platform: esphome

# WiFi 设置
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # power_save_mode: "HIGH"           # 深度节能（功耗低，稳定性差）

# 字体配置
font:
  - file:
      type: gfonts                  # 字体来源：谷歌字体
      family: "Noto Sans SC"        # 字体家族：思源黑体（简体中文）
      weight: 400                   # 字重：常规（Regular，400）
      italic: false                 # 非斜体
    id: cn_font                     # 字体唯一ID
    size: 36                        # 字号：36
    glyphs: ${allowed_characters}   # 只加载指定字符
    ignore_missing_glyphs: true     # 忽略字体中缺失的字符，不报错
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 400
      italic: false
    id: big_font
    size: 56
    glyphs: ${allowed_characters}
    ignore_missing_glyphs: true
  - file: "gfonts://Material+Symbols+Outlined"
    id: icons_gfont
    size: 36
    glyphs: ["\U0000e425"] # mdi-timer
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_font
    size: 36
    glyphs:
      - "\U000F007A"  # 10%
      - "\U000F007B"  # 20%
      - "\U000F007C"  # 30%
      - "\U000F007D"  # 40%
      - "\U000F007E"  # 50%
      - "\U000F007F"  # 60%
      - "\U000F0080"  # 70%
      - "\U000F0081"  # 80%
      - "\U000F0082"  # 90%
      - "\U000F0079"  # 满电量
      - "\U000F0590"  # 天气
      - "\U000F196F"  # 广播
      - "\U000F02DC"  # 客厅
      - "\U000F050F"  # 温度
      - "\U000F058E"  # 湿度
      - "\U000F0F85"  # 气压
      - "\U000F0290"  # 厨房
      - "\U000F1A71"  # 冰箱温度
      - "\U000F02E3"  # 卧室
      - "\U000F140B"  # 闪电
      - "\U000F1A58"  # 总电量
      - "\U000F059D"  # 风量
      - "\U000F001B"  # 空调
      - "\U000F0EE0"  # CPU
      - "\U000F035B"  # 内存
      - "\U000F0BAC"  # PM2.5
      - "\U000F07E4"  # 甲醛
      - "\U000F011C"  # M5PAPER
      - "\U000F1B1E"  # 电压

# SPI 总线
spi:
  clk_pin: GPIO14                 # SPI 时钟引脚
  mosi_pin: GPIO12                # MOSI
  miso_pin: GPIO13                # MISO

# I2C 总线
i2c:
  sda: GPIO21                     # I2C 数据线
  scl: GPIO22                     # I2C 时钟线

# 显示屏：M5Paper ePaper（基于 IT8951 驱动芯片）
display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15                # 片选引脚
    reset_pin: GPIO23             # 复位引脚
    busy_pin: GPIO27              # 忙信号引脚
    rotation: 90                  # 屏幕旋转角度，0是横向
    reversed: False               # 不反转颜色
    update_interval: never        # 不自动刷新，仅手动更新
    full_update_every: 10         # 每10次更新执行一次全刷
    # 在屏幕上绘制内容
    lambda: |-
      const int WIDTH = it.get_width();   // 540
      const int HEIGHT = it.get_height(); // 960

      auto draw_hline = [&](int y) {
        it.line(0, y, WIDTH, y);
      };

      // === 电池图标（右上角）===
      float v_bat = id(m5paper_battery_voltage).state;
      float bat_pct = NAN;
      if (!isnan(v_bat)) {
        constexpr float min_v = 3.52f;
        constexpr float max_v = 4.15f;
        bat_pct = (v_bat - min_v) / (max_v - min_v) * 100.0f;
        bat_pct = clamp(bat_pct, 0.0f, 100.0f);
      }
      const char* bat_icon = "\U000F007A";
      if (!isnan(bat_pct)) {
        if (bat_pct >= 95) bat_icon = "\U000F0079";
        else if (bat_pct >= 85) bat_icon = "\U000F0082";
        else if (bat_pct >= 75) bat_icon = "\U000F0081";
        else if (bat_pct >= 65) bat_icon = "\U000F0080";
        else if (bat_pct >= 55) bat_icon = "\U000F007F";
        else if (bat_pct >= 45) bat_icon = "\U000F007E";
        else if (bat_pct >= 35) bat_icon = "\U000F007D";
        else if (bat_pct >= 25) bat_icon = "\U000F007C";
        else if (bat_pct >= 15) bat_icon = "\U000F007B";
        else bat_icon = "\U000F007A";
      }
      it.print(WIDTH - 10, 10, id(icons_font), TextAlign::TOP_RIGHT, bat_icon);

      // === 第1行：日期 + 星期 ===
      int y = 20;
      auto now = id(rtc_time).now();
      const char* weekdays[] = {"星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"};
      int wday = std::min(6, std::max(0, (int)now.day_of_week));
      char date_week_str[50];
      snprintf(date_week_str, sizeof(date_week_str), "%04d年%02d月%02d日 %s",
               now.year, now.month, now.day, weekdays[wday]);
      it.print(WIDTH / 2, y, id(cn_font), TextAlign::TOP_CENTER, date_week_str);
      y += 50;

      // === 第2行：大字时间 ===
      char time_str[16];
      sprintf(time_str, "%02d:%02d", now.hour, now.minute);
      it.print(WIDTH / 2, y, id(big_font), TextAlign::TOP_CENTER, time_str);
      y += 80;

      // === 天气区 ===
      draw_hline(y);
      y += 5;
      it.print(10, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F0590");
      it.print(50, y, id(cn_font), TextAlign::TOP_LEFT, "厦门天气");
      y += 50;

      // 天气数据行1: 温/湿/压
      int x = 50;
      if (!isnan(id(xiamen_temp).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F050F");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1f℃", id(xiamen_temp).state);
        x += 80;
      }
      if (!isnan(id(xiamen_humi).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F058E");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.0f%%", id(xiamen_humi).state);
        x += 80;
      }
      if (!isnan(id(xiamen_pressure).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F0F85");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.0fhPa", id(xiamen_pressure).state);
      }
      y += 45;

      // 天气数据行2: 风速 / PM2.5
      x = 50;
      if (!isnan(id(xiamen_windspeed).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F059D");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1fkm/h", id(xiamen_windspeed).state);
        x += 80;
      }
      if (!isnan(id(xiamen_pm25).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F0BAC");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.0f", id(xiamen_pm25).state);
      }
      y += 45;

      // 天气预报文本（单独一行，左对齐）
      if (!id(xiamen_weather).state.empty()) {
        it.print(50, y, id(cn_font), TextAlign::TOP_LEFT, id(xiamen_weather).state.c_str());
        y += 45;
      }

      // === 客厅区 ===
      draw_hline(y);50+45+45+45+
      y += 5;
      it.print(10, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F02DC");
      it.print(50, y, id(cn_font), TextAlign::TOP_LEFT, "客厅");
      y += 50;

      // 小米温湿度
      x = 50;
      if (!isnan(id(xiaomi_temp).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F050F");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1f℃", id(xiaomi_temp).state);
        x += 80;
      }
      if (!isnan(id(xiaomi_humi).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F058E");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.0f%%", id(xiaomi_humi).state);
      }
      y += 45;

      // ZM1: PM2.5 + HCHO
      x = 50;
      if (!isnan(id(zm1_pm25).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F0BAC");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.0f", id(zm1_pm25).state);
        x += 80;
      }
      if (!isnan(id(zm1_hcho).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F07E4");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.2f", id(zm1_hcho).state);
      }
      y += 45;

      // 弱电箱: 功率 + kWh
      x = 50;
      if (!isnan(id(cmpower1_power).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "弱电箱： \U000F140B");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1fW", id(cmpower1_power).state);
        x += 80;
      }
      if (!isnan(id(cmpower1_energy).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F1A58");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1fkWh", id(cmpower1_energy).state / 1000.0f);
      }
      y += 45;

      // NAS: CPU + 内存
      x = 50;
      if (!isnan(id(nas_cpu).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "NAS： \U000F0EE0");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.0f%%", id(nas_cpu).state);
        x += 80;
      }
      if (!isnan(id(nas_mem).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F035B");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.0fMB", id(nas_mem).state);
      }
      y += 45;

      // 群晖硬盘温度（假设为 nas_disk1_temp, nas_disk2_temp）
      x = 50;
      if (!isnan(id(nas_disk1_temp).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "硬盘： \U000F050F");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1f℃", id(nas_disk1_temp).state);
        x += 80;
      }
      if (!isnan(id(nas_disk2_temp).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F050F");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1f℃", id(nas_disk2_temp).state);
      }
      y += 45;

      // === 卧室区 ===
      draw_hline(y);
      y += 5;
      it.print(10, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F02E3");
      it.print(50, y, id(cn_font), TextAlign::TOP_LEFT, "卧室");
      y += 50;

      // 青萍温湿度
      x = 50;
      if (!isnan(id(qp_temp).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F050F");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1f℃", id(qp_temp).state);
        x += 80;
      }
      if (!isnan(id(qp_humi).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F058E");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.0f%%", id(qp_humi).state);
      }
      y += 45;

      // 空调功率
      x = 50;
      if (!isnan(id(ac2_power).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "空调： \U000F001B");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1fW", id(ac2_power).state);
        x += 80;
      }
      y += 45;

      // 工作台: 功率 + kWh
      x = 50;
      if (!isnan(id(cmpower2_power).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "工作台： \U000F140B");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1fW", id(cmpower2_power).state);
        x += 80;
      }
      if (!isnan(id(cmpower2_energy).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F1A58");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1fkWh", id(cmpower2_energy).state / 1000.0f);
      }
      y += 45;

      // === 厨房区 ===
      draw_hline(y);
      y += 5;
      it.print(10, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F0290");
      it.print(50, y, id(cn_font), TextAlign::TOP_LEFT, "厨房");
      y += 50;

      // 冰箱温度
      x = 50;
      if (!isnan(id(icebox_temp01).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "冰箱： \U000F1A71");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1f℃", id(icebox_temp01).state);
        x += 80;
      }
      if (!isnan(id(icebox_temp02).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F1A71");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1f℃", id(icebox_temp02).state);
      }
      y += 45;

      // === 本机区 ===
      draw_hline(y);
      y += 5;
      it.print(10, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F011C");
      it.print(50, y, id(cn_font), TextAlign::TOP_LEFT, "M5Paper");
      y += 50;

      // 本机温湿度 + 电压
      x = 50;
      if (!isnan(id(m5paper_temperature).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F050F");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.1f℃", id(m5paper_temperature).state);
        x += 80;
      }
      if (!isnan(id(m5paper_humidity).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F058E");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.0f%%", id(m5paper_humidity).state);
        x += 80;
      }
      if (!isnan(id(m5paper_battery_voltage).state)) {
        it.print(x, y, id(icons_font), TextAlign::TOP_LEFT, "\U000F1B1E");
        it.printf(x + 40, y, id(cn_font), TextAlign::TOP_LEFT, "%.2fV", id(m5paper_battery_voltage).state);
      }

# 重启开关
switch:
  - platform: restart
    id: restart_switch
    name: ${device_name} Restart

# 深度睡眠配置（基于 BM8563 RTC 定时唤醒）
deep_sleep:
  id: deep_sleep_10min
  run_duration: 30s      # 唤醒后最多运行 40 秒（足够完成联网+刷新）
  sleep_duration: 10min   # 睡眠 10 分钟

# 时间同步配置
time:
  - platform: homeassistant       # 从 Home Assistant 获取网络时间
    id: homeassistant_time
    timezone: Asia/Shanghai        # 时区设置
    on_time_sync:
      - bm8563.write_time         # 时间同步成功后，写入 RTC （BM8563）
  - platform: bm8563              # 使用 BM8563 实时时钟（I2C 接口）
    id: rtc_time

# M5Paper 电源管理（控制主电/电池切换）
m5paper:
  battery_power_pin: GPIO5        # 电池供电使能引脚
  main_power_pin: GPIO2           # 外部电源检测引脚

# 传感器配置
sensor:
  # 电池电压检测（通过 ADC 读取）
  - platform: adc
    pin: GPIO35                                  # ADC 引脚
    name: ${device_name} battery voltage
    id: m5paper_battery_voltage
    # update_interval: 60s
    attenuation: 12db                            # 使用 12dB 衰减（支持最高 ~3.9V 输入）
    filters:
      - multiply: 2                              # 分压电阻比为 1:1，所以乘以 2 得到真实电压

  # SHT30温湿度传感器（I2C 地址 0x44）
  - platform: sht3xd
    temperature:
      name: ${device_name} temperature
      id: m5paper_temperature
      device_class: "temperature"
      state_class: "measurement"
      icon: mdi:thermometer
    humidity:
      name: ${device_name} humidity
      id: m5paper_humidity
      device_class: "humidity"
      state_class: "measurement"
      icon: mdi:water-percent
    address: 0x44
    # update_interval: 60s

  # 厦门天气
  - platform: homeassistant
    name: xiamen temperature
    entity_id: sensor.xiamen_temperature
    id: xiamen_temp
    unit_of_measurement: "°C"
  - platform: homeassistant
    name: xiamen humidity
    id: xiamen_humi
    entity_id: sensor.xiamen_humidity
  - platform: homeassistant
    name: xiamen pressure
    id: xiamen_pressure
    entity_id: sensor.xiamen_atmospheric_pressure
    unit_of_measurement: "hPa"
  - platform: homeassistant
    name: xiamen pm25
    id: xiamen_pm25
    entity_id: sensor.xiamen_pm25
  - platform: homeassistant
    name: xiamen windspeed
    id: xiamen_windspeed
    entity_id: sensor.xiamen_wind_speed
    unit_of_measurement: "km/h"

  # 小米温湿度计
  - platform: homeassistant
    name: xiaomi temperature
    entity_id: sensor.cleargras_cn_blt_3_u5c2qgggk400_dk1_temperature_p_2_1
    id: xiaomi_temp
    unit_of_measurement: "°C"
  - platform: homeassistant
    name: xiaomi humidity
    id: xiaomi_humi
    entity_id: sensor.cleargras_cn_blt_3_u5c2qgggk400_dk1_relative_humidity_p_2_2

  # 青萍温湿度计
  - platform: homeassistant
    name: qingping temperature
    entity_id: sensor.cgllc_cn_blt_3_1mitqg1roc800_dove_temperature_p_2_1
    id: qp_temp
    unit_of_measurement: "°C"
  - platform: homeassistant
    name: qingping humidity
    id: qp_humi
    entity_id: sensor.cgllc_cn_blt_3_1mitqg1roc800_dove_relative_humidity_p_2_2

  # ZM1
  - platform: homeassistant
    name: zm1 temperature
    entity_id: sensor.zm1_b0f89324aed7_temperature
    id: zm1_temp
    unit_of_measurement: "°C"
  - platform: homeassistant
    name: zm1 humidity
    id: zm1_humi
    entity_id: sensor.zm1_b0f89324aed7_humidity
  - platform: homeassistant
    name: zm1 pm25
    id: zm1_pm25
    entity_id: sensor.zm1_b0f89324aed7_pm25
  - platform: homeassistant
    name: zm1 hcho
    id: zm1_hcho
    entity_id: sensor.zm1_b0f89324aed7_hcho
    unit_of_measurement: "mg/m3"

  # 群晖
  - platform: homeassistant
    name: nas temperature
    entity_id: sensor.cnas2010_temperature
    id: nas_temp
    unit_of_measurement: "°C"
  - platform: homeassistant
    name: nas cpu
